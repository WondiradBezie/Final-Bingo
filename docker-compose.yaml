version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: bingo
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: bingo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bingo_network
    restart: always

  # Redis for caching and real-time data
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - bingo_network
    restart: always

  # FastAPI WebSocket Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://bingo:secure_password@postgres/bingo
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/app/data
      - ./webapp:/app/webapp
    networks:
      - bingo_network
    restart: always

  # Telegram Bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      DATABASE_URL: postgresql://bingo:secure_password@postgres/bingo
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: https://yourdomain.com
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - ./data:/app/data
    networks:
      - bingo_network
    restart: always

  # Nginx for static files and reverse proxy
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./webapp:/usr/share/nginx/html/webapp
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - bingo_network
    restart: always

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - bingo_network
    restart: always

  # Grafana for dashboards
  grafana:
    image: grafana/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - bingo_network
    restart: always

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  bingo_network:
    driver: bridge