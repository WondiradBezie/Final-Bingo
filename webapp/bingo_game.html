<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Bingo - Game</title>
    <link rel="stylesheet" href="/webapp/css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .free-space {
            background: linear-gradient(135deg, #ffd700, #ffa500) !important;
            color: #000 !important;
            font-weight: bold;
            cursor: default !important;
        }
        .free-space.marked {
            background: linear-gradient(135deg, #10b981, #059669) !important;
            color: white !important;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        .card-btn {
            padding: 5px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🎮 Joy Bingo</h1>
            <div class="game-info">
                <div class="info-item">
                    <div class="info-label">Room</div>
                    <div class="info-value" id="room-name">Classic</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Players</div>
                    <div class="info-value" id="player-count">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Prize Pool</div>
                    <div class="info-value prize-pool" id="prize-pool">0 Birr</div>
                </div>
            </div>
        </div>

        <div id="card-selection" class="card-selection">
            <h2>Select Your Card (1-400)</h2>
            <div class="card-grid" id="card-grid">
                <!-- 400 cards will be loaded here -->
            </div>
        </div>

        <div id="game-board" class="game-board" style="display: none;">
            <div class="bingo-grid" id="bingo-grid">
                <!-- Bingo grid will be loaded here -->
            </div>
            
            <div class="called-numbers">
                <h3>Called Numbers</h3>
                <div class="numbers-container" id="called-numbers"></div>
            </div>

            <div class="game-controls">
                <button class="btn btn-primary" id="bingo-btn" onclick="callBingo()" disabled>🎯 Call BINGO!</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'classic';
        const userId = urlParams.get('user') || tg.initDataUnsafe?.user?.id || 'test_user';
        const username = tg.initDataUnsafe?.user?.username || 'Player';

        let selectedCard = null;
        let gameState = {
            card: [],
            marked: new Set(),
            calledNumbers: [],
            gameActive: false
        };

        // Generate 400 cards (1-400)
        function loadCards() {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 400; i++) {
                const btn = document.createElement('button');
                btn.className = 'card-btn';
                btn.textContent = `#${i}`;
                btn.onclick = () => selectCard(i);
                
                // Randomly mark some cards as taken for demo (remove in production)
                if (Math.random() < 0.1) {
                    btn.disabled = true;
                    btn.classList.add('taken');
                }
                
                grid.appendChild(btn);
            }
        }

        // Generate a valid bingo card with proper column ranges
        function generateValidCard(cardNumber) {
            const card = new Array(25).fill(0);
            
            // Use card number as seed for consistent generation
            const seed = cardNumber * 1000;
            
            // Generate numbers for each column with proper ranges
            for (let col = 0; col < 5; col++) {
                // Calculate range for this column
                const min = col * 15 + 1;
                const max = min + 14;
                
                // Generate 5 unique numbers for this column
                const colNumbers = [];
                while (colNumbers.length < 5) {
                    const num = Math.floor(Math.random() * 15) + min;
                    if (!colNumbers.includes(num)) {
                        colNumbers.push(num);
                    }
                }
                
                // Sort and place in column
                colNumbers.sort((a, b) => a - b);
                for (let row = 0; row < 5; row++) {
                    const index = row * 5 + col;
                    card[index] = colNumbers[row];
                }
            }
            
            // Set free space in middle (N column, 3rd row - index 12)
            card[12] = 'FREE';
            
            return card;
        }

        // Select a card
        async function selectCard(cardNumber) {
            selectedCard = cardNumber;
            
            const response = await fetch('/api/game/select_card', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    room_id: roomId,
                    card_number: cardNumber
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                // Hide selection, show game board
                document.getElementById('card-selection').style.display = 'none';
                document.getElementById('game-board').style.display = 'block';
                
                // Generate valid card
                gameState.card = generateValidCard(cardNumber);
                gameState.marked = new Set();
                gameState.gameActive = true;
                
                // Mark free space as already marked
                gameState.marked.add('FREE');
                
                renderBoard();
                startGame();
            } else {
                alert(result.error || 'Failed to select card');
            }
        }

        // Render bingo board
        function renderBoard() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            
            // Add BINGO header
            ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell header';
                cell.textContent = letter;
                grid.appendChild(cell);
            });
            
            // Add numbers (5x5 grid)
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                
                if (gameState.card[i] === 'FREE') {
                    cell.textContent = '⭐ FREE';
                    cell.classList.add('free-space');
                    if (gameState.marked.has('FREE')) {
                        cell.classList.add('marked');
                    }
                } else {
                    cell.textContent = gameState.card[i];
                    if (gameState.marked.has(gameState.card[i])) {
                        cell.classList.add('marked');
                    }
                    cell.onclick = () => markNumber(gameState.card[i]);
                }
                
                grid.appendChild(cell);
            }
        }

        // Mark a number
        async function markNumber(number) {
            if (!gameState.gameActive) {
                alert('Game not active!');
                return;
            }
            
            if (!gameState.calledNumbers.includes(number)) {
                alert('❌ Number not called yet!');
                return;
            }
            
            if (gameState.marked.has(number)) {
                return;
            }
            
            const response = await fetch('/api/game/mark_number', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    room_id: roomId,
                    number: number
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                gameState.marked.add(number);
                updateBoard();
                
                if (result.bingo) {
                    document.getElementById('bingo-btn').disabled = false;
                    alert('🎯 You have BINGO! Click the BINGO button to win!');
                }
            }
        }

        // Update board display
        function updateBoard() {
            const cells = document.querySelectorAll('.grid-cell:not(.header)');
            cells.forEach((cell, index) => {
                const value = gameState.card[index];
                if (value === 'FREE') {
                    if (gameState.marked.has('FREE')) {
                        cell.classList.add('marked');
                    }
                } else if (gameState.marked.has(value)) {
                    cell.classList.add('marked');
                }
            });
        }

        // Check for bingo
        function checkForBingo() {
            // Check all numbers marked (including FREE)
            const allMarked = gameState.card.every(num => 
                num === 'FREE' || gameState.marked.has(num)
            );
            
            if (allMarked) {
                document.getElementById('bingo-btn').disabled = false;
                return true;
            }
            
            // Check rows
            for (let row = 0; row < 5; row++) {
                let rowComplete = true;
                for (let col = 0; col < 5; col++) {
                    const index = row * 5 + col;
                    const num = gameState.card[index];
                    if (num !== 'FREE' && !gameState.marked.has(num)) {
                        rowComplete = false;
                        break;
                    }
                }
                if (rowComplete) {
                    document.getElementById('bingo-btn').disabled = false;
                    return true;
                }
            }
            
            // Check columns
            for (let col = 0; col < 5; col++) {
                let colComplete = true;
                for (let row = 0; row < 5; row++) {
                    const index = row * 5 + col;
                    const num = gameState.card[index];
                    if (num !== 'FREE' && !gameState.marked.has(num)) {
                        colComplete = false;
                        break;
                    }
                }
                if (colComplete) {
                    document.getElementById('bingo-btn').disabled = false;
                    return true;
                }
            }
            
            return false;
        }

        // Call bingo
        async function callBingo() {
            const response = await fetch('/api/game/call_bingo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    room_id: roomId
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert(`🎉🎉🎉 BINGO! You win ${result.prize} Birr! 🎉🎉🎉`);
                gameState.gameActive = false;
                setTimeout(() => {
                    if (confirm('Play again?')) {
                        location.reload();
                    }
                }, 3000);
            } else {
                alert(result.message);
            }
        }

        // Start game
        function startGame() {
            // Poll for room info
            const interval = setInterval(async () => {
                try {
                    const response = await fetch('/api/rooms/' + roomId);
                    const room = await response.json();
                    document.getElementById('player-count').textContent = room.players;
                    document.getElementById('prize-pool').textContent = room.prize_pool + ' Birr';
                } catch (e) {
                    console.error('Error fetching room:', e);
                }
            }, 2000);
            
            // Simulate number calls (in production, this would come from WebSocket)
            const callInterval = setInterval(() => {
                if (!gameState.gameActive) return;
                
                if (gameState.calledNumbers.length < 75) {
                    let num;
                    do {
                        num = Math.floor(Math.random() * 75) + 1;
                    } while (gameState.calledNumbers.includes(num));
                    
                    gameState.calledNumbers.push(num);
                    updateCalledNumbers();
                    
                    // Auto-mark if number is on player's card
                    if (gameState.card.includes(num)) {
                        setTimeout(() => {
                            markNumber(num);
                        }, 500);
                    }
                    
                    // Check for bingo after each call
                    if (checkForBingo()) {
                        // Bingo achieved!
                    }
                }
            }, 3000);
        }

        // Update called numbers display
        function updateCalledNumbers() {
            const container = document.getElementById('called-numbers');
            container.innerHTML = '';
            
            gameState.calledNumbers.slice(-15).forEach(num => {
                const ball = document.createElement('div');
                ball.className = 'number-ball';
                
                // Color by range
                if (num <= 15) ball.classList.add('b-range');
                else if (num <= 30) ball.classList.add('i-range');
                else if (num <= 45) ball.classList.add('n-range');
                else if (num <= 60) ball.classList.add('g-range');
                else ball.classList.add('o-range');
                
                ball.textContent = num;
                container.appendChild(ball);
            });
        }

        // Initialize
        loadCards();
    </script>
</body>
</html>
