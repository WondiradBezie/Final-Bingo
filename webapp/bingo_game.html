<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Bingo - Game</title>
    <link rel="stylesheet" href="/webapp/css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .free-space {
            background: linear-gradient(135deg, #ffd700, #ffa500) !important;
            color: #000 !important;
            font-weight: bold;
            cursor: default !important;
        }
        .free-space.marked {
            background: linear-gradient(135deg, #10b981, #059669) !important;
            color: white !important;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }
        .card-btn {
            padding: 8px 4px;
            font-size: 0.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .card-btn:hover:not(:disabled) {
            border-color: #6366f1;
            background: #f0f9ff;
            transform: translateY(-2px);
        }
        .card-btn.taken {
            background: #fee2e2;
            border-color: #ef4444;
            opacity: 0.6;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .card-btn.selected {
            background: #10b981;
            border-color: #059669;
            color: white;
        }
        .loading-cards {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🎮 Joy Bingo</h1>
            <div class="game-info">
                <div class="info-item">
                    <div class="info-label">Room</div>
                    <div class="info-value" id="room-name">Classic</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Players</div>
                    <div class="info-value" id="player-count">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Prize Pool</div>
                    <div class="info-value prize-pool" id="prize-pool">0 Birr</div>
                </div>
            </div>
        </div>

        <div id="card-selection" class="card-selection">
            <h2>Select Your Card (1-400)</h2>
            <div class="loading-cards" id="loading-cards">Loading available cards...</div>
            <div class="card-grid" id="card-grid" style="display: none;"></div>
        </div>

        <div id="game-board" class="game-board" style="display: none;">
            <div class="bingo-grid" id="bingo-grid"></div>
            
            <div class="called-numbers">
                <h3>Called Numbers</h3>
                <div class="numbers-container" id="called-numbers"></div>
            </div>

            <div class="game-controls">
                <button class="btn btn-primary" id="bingo-btn" onclick="callBingo()" disabled>🎯 Call BINGO!</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'classic';
        const userId = urlParams.get('user') || tg.initDataUnsafe?.user?.id || 'test_user';
        const username = tg.initDataUnsafe?.user?.username || 'Player';

        let selectedCard = null;
        let takenCards = [];
        let gameState = {
            card: [],
            marked: new Set(['FREE']), // FREE space always marked
            calledNumbers: [],
            gameActive: false
        };

        // Load available cards and taken status
        async function loadCards() {
            document.getElementById('loading-cards').style.display = 'block';
            document.getElementById('card-grid').style.display = 'none';
            
            try {
                // Fetch taken cards from server
                const response = await fetch(`/api/game/taken_cards/${roomId}`);
                const data = await response.json();
                takenCards = data.taken_cards || [];
                
                // Display room info
                const roomResponse = await fetch('/api/rooms/' + roomId);
                const room = await roomResponse.json();
                document.getElementById('room-name').textContent = room.name;
                
                // Build card grid
                const grid = document.getElementById('card-grid');
                grid.innerHTML = '';
                
                for (let i = 1; i <= 400; i++) {
                    const cardNum = i.toString();
                    const btn = document.createElement('button');
                    btn.className = 'card-btn';
                    btn.textContent = `#${i}`;
                    btn.dataset.cardNum = cardNum;
                    
                    // Check if card is taken
                    if (takenCards.includes(cardNum)) {
                        btn.disabled = true;
                        btn.classList.add('taken');
                        btn.title = 'Card already taken';
                    }
                    
                    btn.onclick = () => selectCard(i);
                    grid.appendChild(btn);
                }
                
                document.getElementById('loading-cards').style.display = 'none';
                document.getElementById('card-grid').style.display = 'grid';
                
            } catch (error) {
                console.error('Error loading cards:', error);
                document.getElementById('loading-cards').innerHTML = 'Error loading cards. <button onclick="loadCards()">Retry</button>';
            }
        }

        // Select a card
        async function selectCard(cardNumber) {
            if (takenCards.includes(cardNumber.toString())) {
                alert('This card is already taken!');
                return;
            }
            
            selectedCard = cardNumber;
            
            // Show loading state
            const buttons = document.querySelectorAll('.card-btn');
            buttons.forEach(btn => {
                if (btn.dataset.cardNum === cardNumber.toString()) {
                    btn.classList.add('selected');
                    btn.textContent = '✓ Selected';
                }
            });
            
            const response = await fetch('/api/game/select_card', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    room_id: roomId,
                    card_number: cardNumber,
                    username: username
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                // Hide selection, show game board
                document.getElementById('card-selection').style.display = 'none';
                document.getElementById('game-board').style.display = 'block';
                
                // Get the actual card from server response
                gameState.card = result.game_state.card;
                gameState.gameActive = true;
                
                renderBoard();
                startGame();
            } else {
                alert(result.error || 'Failed to select card');
                // Reset button
                buttons.forEach(btn => {
                    if (btn.dataset.cardNum === cardNumber.toString()) {
                        btn.classList.remove('selected');
                        btn.textContent = `#${cardNumber}`;
                    }
                });
            }
        }

        // Render bingo board
        function renderBoard() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            
            // Add BINGO header
            ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell header';
                cell.textContent = letter;
                grid.appendChild(cell);
            });
            
            // Add numbers (5x5 grid)
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                
                if (i === 12) { // Center is FREE space
                    cell.textContent = '⭐ FREE';
                    cell.classList.add('free-space', 'marked');
                } else {
                    const number = gameState.card[i];
                    cell.textContent = number;
                    
                    // Color by range
                    if (number <= 15) cell.style.background = '#fee2e2';
                    else if (number <= 30) cell.style.background = '#fff3cd';
                    else if (number <= 45) cell.style.background = '#d1e7dd';
                    else if (number <= 60) cell.style.background = '#cfe2ff';
                    else cell.style.background = '#e2d5f3';
                    
                    cell.onclick = () => markNumber(number);
                }
                
                grid.appendChild(cell);
            }
        }

        // Mark a number
        async function markNumber(number) {
            if (!gameState.gameActive) {
                alert('Game not active!');
                return;
            }
            
            if (!gameState.calledNumbers.includes(number)) {
                alert('❌ Number not called yet!');
                return;
            }
            
            if (gameState.marked.has(number)) {
                return;
            }
            
            const response = await fetch('/api/game/mark_number', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    room_id: roomId,
                    number: number
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                gameState.marked.add(number);
                updateBoard();
                
                if (result.bingo) {
                    document.getElementById('bingo-btn').disabled = false;
                    alert('🎯 You have BINGO! Click the BINGO button to win!');
                }
            }
        }

        // Update board display
        function updateBoard() {
            const cells = document.querySelectorAll('.grid-cell:not(.header)');
            cells.forEach((cell, index) => {
                if (index === 12) return; // Skip FREE space
                
                const number = parseInt(cell.textContent);
                if (gameState.marked.has(number)) {
                    cell.classList.add('marked');
                }
            });
        }

        // Check for bingo
        function checkForBingo() {
            // Check all numbers marked (FREE is already marked)
            const allMarked = gameState.card.every(num => 
                gameState.marked.has(num)
            );
            
            if (allMarked) {
                document.getElementById('bingo-btn').disabled = false;
                return true;
            }
            
            // Check rows
            for (let row = 0; row < 5; row++) {
                let rowComplete = true;
                for (let col = 0; col < 5; col++) {
                    const index = row * 5 + col;
                    const num = gameState.card[index];
                    if (!gameState.marked.has(num)) {
                        rowComplete = false;
                        break;
                    }
                }
                if (rowComplete) {
                    document.getElementById('bingo-btn').disabled = false;
                    return true;
                }
            }
            
            // Check columns
            for (let col = 0; col < 5; col++) {
                let colComplete = true;
                for (let row = 0; row < 5; row++) {
                    const index = row * 5 + col;
                    const num = gameState.card[index];
                    if (!gameState.marked.has(num)) {
                        colComplete = false;
                        break;
                    }
                }
                if (colComplete) {
                    document.getElementById('bingo-btn').disabled = false;
                    return true;
                }
            }
            
            return false;
        }

        // Call bingo
        async function callBingo() {
            const response = await fetch('/api/game/call_bingo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    room_id: roomId
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert(`🎉🎉🎉 BINGO! You win ${result.prize} Birr! 🎉🎉🎉`);
                gameState.gameActive = false;
                setTimeout(() => {
                    if (confirm('Play again?')) {
                        location.reload();
                    }
                }, 3000);
            } else {
                alert(result.message);
            }
        }

        // Start game
        function startGame() {
            // Poll for room info
            setInterval(async () => {
                try {
                    const response = await fetch('/api/rooms/' + roomId);
                    const room = await response.json();
                    document.getElementById('player-count').textContent = room.players;
                    document.getElementById('prize-pool').textContent = room.prize_pool + ' Birr';
                } catch (e) {
                    console.error('Error fetching room:', e);
                }
            }, 2000);
            
            // Simulate number calls (in production, this would come from WebSocket)
            setInterval(() => {
                if (!gameState.gameActive) return;
                
                if (gameState.calledNumbers.length < 75) {
                    let num;
                    do {
                        num = Math.floor(Math.random() * 75) + 1;
                    } while (gameState.calledNumbers.includes(num));
                    
                    gameState.calledNumbers.push(num);
                    updateCalledNumbers();
                    
                    // Auto-mark if number is on player's card
                    if (gameState.card.includes(num)) {
                        setTimeout(() => {
                            markNumber(num);
                        }, 500);
                    }
                    
                    // Check for bingo
                    checkForBingo();
                }
            }, 3000);
        }

        // Update called numbers display
        function updateCalledNumbers() {
            const container = document.getElementById('called-numbers');
            container.innerHTML = '';
            
            gameState.calledNumbers.slice(-15).forEach(num => {
                const ball = document.createElement('div');
                ball.className = 'number-ball';
                
                if (num <= 15) ball.classList.add('b-range');
                else if (num <= 30) ball.classList.add('i-range');
                else if (num <= 45) ball.classList.add('n-range');
                else if (num <= 60) ball.classList.add('g-range');
                else ball.classList.add('o-range');
                
                ball.textContent = num;
                container.appendChild(ball);
            });
        }

        // Initialize
        loadCards();
    </script>
</body>
</html>
