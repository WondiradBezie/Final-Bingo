<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joy Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #4158D0;
            background: linear-gradient(135deg, #4158D0 0%, #C850C0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .game-container {
            width: 100%;
            max-width: 950px;
            background: white;
            border-radius: 15px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: 98vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Stats - Single Line */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #405DE6, #833AB4);
            color: white;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            flex-wrap: nowrap;
            gap: 5px;
        }

        .stat-block {
            text-align: center;
            min-width: 45px;
        }

        .stat-label {
            font-size: 9px;
            opacity: 0.9;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            line-height: 1.2;
        }

        .game-title {
            font-size: 16px;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* Card Selection Screen - Use full height */
        .selection-screen {
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .selection-header {
            background: linear-gradient(135deg, #405DE6, #833AB4);
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .selection-title {
            font-size: 16px;
            font-weight: bold;
        }

        .selection-subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 0;
        }

        .card-btn {
            padding: 12px 2px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            text-align: center;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-btn.taken {
            background: #ffcdd2;
            border-color: #ef9a9a;
            color: #b71c1c;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .card-btn.selected {
            background: #4caf50;
            color: white;
            border-color: #2e7d32;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 14px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Game Screen - Use full height */
        #gameScreen {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Main Content - Two Columns with flex growth */
        .main-content {
            display: flex;
            gap: 10px;
            flex: 1;
            min-height: 0;
        }

        /* Left Side - Number Board - NARROWER BUTTONS */
        .number-board {
            flex: 0.9;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 8px;
            border: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 2px;
            flex-shrink: 0;
        }

        .board-title {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        .called-badge {
            background: #ff4444;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: bold;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            flex: 1;
            min-height: 0;
        }

        .number-column {
            display: flex;
            flex-direction: column;
            gap: 2px;
            height: 100%;
        }

        .column-header {
            text-align: center;
            font-weight: bold;
            font-size: 9px;
            padding: 1px;
            border-radius: 3px;
            margin-bottom: 1px;
            flex-shrink: 0;
        }

        .column-header.b { background: #ffcdd2; color: #b71c1c; }
        .column-header.i { background: #fff9c4; color: #f57f17; }
        .column-header.n { background: #c8e6c9; color: #1b5e20; }
        .column-header.g { background: #bbdefb; color: #0d47a1; }
        .column-header.o { background: #e1bee7; color: #4a148c; }

        .number-cell {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 600;
            background: white;
            border-radius: 2px;
            color: #333;
            border: 1px solid #dee2e6;
            min-height: 0;
            padding: 0;
            margin: 0;
        }

        .number-cell.called {
            background: #4caf50 !important;
            color: white !important;
            border-color: #2e7d32;
        }

        /* Right Side Container - WIDER */
        .right-container {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            gap: 5px; /* Reduced gap to bring bingo button closer */
            min-height: 0;
        }

        /* Current Call Section (unchanged) */
        .current-call-section {
            background: #ff4444;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .call-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .call-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .call-label {
            font-size: 12px;
            opacity: 0.9;
            font-weight: 500;
        }

        .call-number-big {
            font-size: 24px;
            font-weight: 800;
            line-height: 1;
        }

        .call-letter-big {
            font-size: 20px;
            font-weight: 700;
        }

        .recent-calls-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            justify-content: flex-end;
        }

        .recent-ball {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
        }

        /* Player Card - BIGGER BUTTONS */
        .player-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 8px;
            border: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 2px;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        .card-number {
            background: #833AB4;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: bold;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px; /* Increased gap for more visibility */
            flex: 1;
            min-height: 0;
        }

        .player-column {
            display: flex;
            flex-direction: column;
            gap: 4px; /* Increased gap for more height between buttons */
            height: 100%;
        }

        .player-cell {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px; /* Larger font */
            font-weight: 700;
            background: white;
            border-radius: 8px; /* More rounded */
            color: #333;
            border: 2px solid #dee2e6;
            cursor: pointer;
            width: 100%;
            aspect-ratio: 1/1;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15); /* Stronger shadow */
            height: auto;
            min-height: 0;
            max-height: 58px; /* Taller buttons */
        }

        .player-cell.header {
            background: linear-gradient(135deg, #405DE6, #833AB4);
            color: white;
            font-size: 16px; /* Larger font */
            font-weight: 800;
            border: none;
            cursor: default;
            flex-shrink: 0;
            aspect-ratio: 1/1;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            max-height: 58px; /* Taller buttons */
        }

        .player-cell.marked {
            background: #4caf50 !important;
            color: white !important;
            border-color: #2e7d32;
            font-weight: 800;
            border-width: 2px;
        }

        .player-cell.free {
            background: #ffd700;
            color: #333;
            font-weight: 800;
        }

        .player-cell.free.marked {
            background: #4caf50 !important;
            color: white !important;
        }

        /* Bingo Button - Closer to card */
        .bingo-section {
            flex-shrink: 0;
            margin-top: 0; /* Remove any top margin */
        }

        .bingo-btn {
            width: 100%;
            padding: 10px; /* Slightly smaller padding */
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px; /* Slightly smaller font */
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .bingo-btn:hover {
            background: #ff6666;
            transform: translateY(-2px);
        }

        .bingo-btn:active {
            transform: translateY(0);
        }

        .hidden {
            display: none !important;
        }

        .cards-grid::-webkit-scrollbar {
            width: 3px;
        }
        
        .cards-grid::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Card Selection Screen -->
        <div id="selectionScreen" class="selection-screen">
            <div class="selection-header">
                <span class="selection-title">🎮 Joy Bingo</span>
                <span class="selection-subtitle">Select Card (1-400)</span>
            </div>
            <div class="loading" id="loadingCards">Loading available cards...</div>
            <div class="cards-grid" id="cardsGrid"></div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="hidden">
            <!-- Top Stats Bar - Single Line -->
            <div class="stats-row">
                <div class="game-title">🎮 JOY</div>
                <div class="stat-block">
                    <div class="stat-label">DERASH</div>
                    <div class="stat-value" id="derash">3820</div>
                </div>
                <div class="stat-block">
                    <div class="stat-label">PLAYERS</div>
                    <div class="stat-value" id="player-count">382</div>
                </div>
                <div class="stat-block">
                    <div class="stat-label">BET</div>
                    <div class="stat-value" id="bet">10</div>
                </div>
                <div class="stat-block">
                    <div class="stat-label">CALL</div>
                    <div class="stat-value" id="call-count">0</div>
                </div>
                <div class="stat-block">
                    <div class="stat-label">GAME №</div>
                    <div class="stat-value" id="game-number">1 of 1</div>
                </div>
            </div>

            <!-- Main Game Area -->
            <div class="main-content">
                <!-- Left Side - Number Board - NARROWER BUTTONS -->
                <div class="number-board">
                    <div class="board-header">
                        <span class="board-title">📋 CALLED NUMBERS</span>
                        <span class="called-badge" id="called-count">0/75</span>
                    </div>
                    <div class="numbers-grid" id="number-board"></div>
                </div>

                <!-- Right Side - Current Call, Card, and Bingo Button -->
                <div class="right-container">
                    <!-- Current Call Section -->
                    <div class="current-call-section">
                        <div class="call-row">
                            <div class="call-left">
                                <span class="call-label">CURRENT CALL</span>
                                <span class="call-letter-big" id="current-letter">-</span>
                                <span class="call-number-big" id="current-number">-</span>
                            </div>
                        </div>
                        <div class="recent-calls-row" id="recent-calls"></div>
                    </div>

                    <!-- Player Card - BIGGER BUTTONS -->
                    <div class="player-card">
                        <div class="card-header">
                            <span class="card-title">🎴 YOUR CARD</span>
                            <span class="card-number" id="selected-card-num">#0</span>
                        </div>
                        <div class="bingo-grid" id="bingo-grid"></div>
                    </div>

                    <!-- Bingo Button - Closer to card -->
                    <div class="bingo-section">
                        <button class="bingo-btn" id="bingo-btn" onclick="callBingo()">🎯 BINGO!</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.disableVerticalSwipes();
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'classic';
        const userId = urlParams.get('user') || tg.initDataUnsafe?.user?.id || 'test';
        const username = tg.initDataUnsafe?.user?.username || 'Player';

        // Game state
        let selectedCard = null;
        let takenCards = [];
        let calledNumbers = [];
        let markedNumbers = new Set(['FREE']);
        let gameActive = true;
        let currentCard = [];
        let cardNumber = null;
        let callCount = 0;

        // Initialize number board (column-wise)
        function initNumberBoard() {
            const board = document.getElementById('number-board');
            board.innerHTML = '';
            
            const columns = ['B', 'I', 'N', 'G', 'O'];
            const ranges = [
                {min: 1, max: 15},
                {min: 16, max: 30},
                {min: 31, max: 45},
                {min: 46, max: 60},
                {min: 61, max: 75}
            ];
            
            for (let col = 0; col < 5; col++) {
                const columnDiv = document.createElement('div');
                columnDiv.className = 'number-column';
                
                const header = document.createElement('div');
                header.className = `column-header ${columns[col].toLowerCase()}`;
                header.textContent = columns[col];
                columnDiv.appendChild(header);
                
                for (let num = ranges[col].min; num <= ranges[col].max; num++) {
                    const cell = document.createElement('div');
                    cell.className = 'number-cell';
                    cell.id = `num-${num}`;
                    cell.textContent = num;
                    
                    if (calledNumbers.includes(num)) {
                        cell.classList.add('called');
                    }
                    
                    columnDiv.appendChild(cell);
                }
                
                board.appendChild(columnDiv);
            }
            
            document.getElementById('called-count').textContent = `${calledNumbers.length}/75`;
        }

        // Generate demo card
        function generateDemoCard(cardNum) {
            const card = [];
            for (let col = 0; col < 5; col++) {
                const start = col * 15 + 1;
                const nums = [];
                while (nums.length < 5) {
                    const num = Math.floor(Math.random() * 15) + start;
                    if (!nums.includes(num)) nums.push(num);
                }
                card.push(...nums);
            }
            return card;
        }

        // Render bingo card (column-wise)
        function renderBingoCard() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            
            const columns = ['B', 'I', 'N', 'G', 'O'];
            
            for (let col = 0; col < 5; col++) {
                const columnDiv = document.createElement('div');
                columnDiv.className = 'player-column';
                
                const header = document.createElement('div');
                header.className = 'player-cell header';
                header.textContent = columns[col];
                columnDiv.appendChild(header);
                
                for (let row = 0; row < 5; row++) {
                    const index = row * 5 + col;
                    const cell = document.createElement('div');
                    cell.className = 'player-cell';
                    
                    if (index === 12) {
                        cell.textContent = '⭐';
                        cell.classList.add('free');
                        if (markedNumbers.has('FREE')) {
                            cell.classList.add('marked');
                        }
                    } else {
                        const num = currentCard[index];
                        cell.textContent = num;
                        
                        if (markedNumbers.has(num)) {
                            cell.classList.add('marked');
                        }
                        
                        cell.onclick = () => markNumber(num);
                    }
                    
                    columnDiv.appendChild(cell);
                }
                
                grid.appendChild(columnDiv);
            }
        }

        // Mark a number
        function markNumber(num) {
            if (!calledNumbers.includes(num)) {
                alert(`Number ${num} hasn't been called yet!`);
                return;
            }
            if (markedNumbers.has(num)) return;
            
            markedNumbers.add(num);
            renderBingoCard();
            
            if (checkForBingo()) {
                // Just visual feedback, no status text anymore
            }
        }

        // Check for bingo
        function checkForBingo() {
            for (let row = 0; row < 5; row++) {
                let win = true;
                for (let col = 0; col < 5; col++) {
                    const idx = row * 5 + col;
                    const num = idx === 12 ? 'FREE' : currentCard[idx];
                    if (!markedNumbers.has(num)) {
                        win = false;
                        break;
                    }
                }
                if (win) return true;
            }
            
            for (let col = 0; col < 5; col++) {
                let win = true;
                for (let row = 0; row < 5; row++) {
                    const idx = row * 5 + col;
                    const num = idx === 12 ? 'FREE' : currentCard[idx];
                    if (!markedNumbers.has(num)) {
                        win = false;
                        break;
                    }
                }
                if (win) return true;
            }
            
            return false;
        }

        // Call bingo - always active
        async function callBingo() {
            if (checkForBingo()) {
                alert('🎉 BINGO! You win! 🎉');
            } else {
                alert('You don\'t have bingo yet! Keep playing!');
            }
        }

        // Load cards
        async function loadCards() {
            try {
                let takenCardsData = [];
                try {
                    const response = await fetch(`/api/game/taken_cards/${roomId}`);
                    if (response.ok) {
                        const data = await response.json();
                        takenCardsData = data.taken_cards || [];
                    }
                } catch (e) {
                    takenCardsData = Array.from({length: 40}, () => Math.floor(Math.random() * 400) + 1).map(String);
                }
                
                takenCards = takenCardsData;
                
                const grid = document.getElementById('cardsGrid');
                grid.innerHTML = '';
                document.getElementById('loadingCards').style.display = 'none';
                
                for (let i = 1; i <= 400; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'card-btn';
                    btn.textContent = i;
                    btn.dataset.cardNum = i;
                    
                    if (takenCards.includes(i.toString())) {
                        btn.classList.add('taken');
                        btn.disabled = true;
                    }
                    
                    btn.onclick = () => selectCard(i);
                    grid.appendChild(btn);
                }
            } catch (error) {
                console.error('Error loading cards:', error);
            }
        }

        // Select a card
        async function selectCard(cardNum) {
            if (takenCards.includes(cardNum.toString())) {
                alert('This card is already taken!');
                return;
            }
            
            selectedCard = cardNum;
            
            document.querySelectorAll('.card-btn').forEach(btn => {
                if (btn.dataset.cardNum == cardNum) {
                    btn.classList.add('selected');
                }
            });
            
            try {
                let cardData = null;
                try {
                    const response = await fetch('/api/game/select_card', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            user_id: userId,
                            room_id: roomId,
                            card_number: cardNum,
                            username: username
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success) {
                            cardData = result.game_state.card;
                        }
                    }
                } catch (e) {
                    console.log('Using demo card');
                }
                
                if (!cardData) {
                    cardData = generateDemoCard(cardNum);
                }
                
                document.getElementById('selectionScreen').style.display = 'none';
                document.getElementById('gameScreen').classList.remove('hidden');
                
                currentCard = cardData;
                cardNumber = cardNum;
                
                document.getElementById('selected-card-num').textContent = `#${cardNum}`;
                
                initNumberBoard();
                renderBingoCard();
                updateCurrentCall();
                
                startGame();
                
            } catch (error) {
                console.error('Error selecting card:', error);
                alert('Failed to select card');
            }
        }

        // Update current call
        function updateCurrentCall() {
            if (calledNumbers.length === 0) {
                document.getElementById('current-letter').textContent = '-';
                document.getElementById('current-number').textContent = '-';
                document.getElementById('recent-calls').innerHTML = '';
                return;
            }
            
            const currentNum = calledNumbers[calledNumbers.length - 1];
            let letter = '';
            if (currentNum <= 15) letter = 'B';
            else if (currentNum <= 30) letter = 'I';
            else if (currentNum <= 45) letter = 'N';
            else if (currentNum <= 60) letter = 'G';
            else letter = 'O';
            
            document.getElementById('current-letter').textContent = letter;
            document.getElementById('current-number').textContent = currentNum;
            
            const recent = document.getElementById('recent-calls');
            recent.innerHTML = '';
            calledNumbers.slice(-3).forEach(n => {
                const ball = document.createElement('div');
                ball.className = 'recent-ball';
                ball.textContent = n;
                recent.appendChild(ball);
            });
        }

        // Add called number
        function addCalledNumber(num) {
            if (!calledNumbers.includes(num)) {
                calledNumbers.push(num);
                callCount = calledNumbers.length;
                
                const cell = document.getElementById(`num-${num}`);
                if (cell) cell.classList.add('called');
                
                document.getElementById('called-count').textContent = `${calledNumbers.length}/75`;
                document.getElementById('call-count').textContent = callCount;
                updateCurrentCall();
            }
        }

        // Start game
        function startGame() {
            // Update stats
            setInterval(() => {
                const players = 382;
                document.getElementById('player-count').textContent = players;
                document.getElementById('derash').textContent = players * 10;
            }, 2000);
            
            // Simulate number calls
            const gameInterval = setInterval(() => {
                if (!gameActive) return;
                
                if (calledNumbers.length < 75) {
                    let num;
                    do {
                        num = Math.floor(Math.random() * 75) + 1;
                    } while (calledNumbers.includes(num));
                    
                    addCalledNumber(num);
                }
            }, 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadCards);
    </script>
</body>
</html>
