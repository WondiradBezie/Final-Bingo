<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Bingo - Lobby</title>
    <link rel="stylesheet" href="/webapp/css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="game-header">
            <h1>🎮 Joy Bingo Lobby</h1>
            <div class="game-info">
                <div class="info-item">
                    <div class="info-label">Balance</div>
                    <div class="info-value" id="balance">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Online</div>
                    <div class="info-value" id="online">0</div>
                </div>
            </div>
        </div>

        <!-- Rooms -->
        <div class="rooms-container" id="rooms"></div>

        <!-- Leaderboard -->
        <div class="leaderboard">
            <h2>🏆 Leaderboard</h2>
            <div id="leaderboard-list"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id || 'test_user';
        const username = tg.initDataUnsafe?.user?.username || 'Player';

        async function loadRooms() {
            try {
                const response = await fetch('/api/rooms');
                const rooms = await response.json();
                
                const container = document.getElementById('rooms');
                container.innerHTML = '';
                
                rooms.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.onclick = () => joinRoom(room.id);
                    
                    card.innerHTML = `
                        <div class="room-header">
                            <span class="room-name">${room.name}</span>
                            <span class="room-status status-${room.status}">${room.status}</span>
                        </div>
                        <div class="room-details">
                            <span>👥 ${room.players}/${room.max_players}</span>
                            <span>💰 ${room.prize_pool} Birr</span>
                            <span>💵 ${room.card_price} Birr/card</span>
                        </div>
                        <div class="room-description">${room.description || ''}</div>
                    `;
                    
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading rooms:', error);
            }
        }

        // FIXED: This function now properly passes room parameter
        async function joinRoom(roomId) {
            console.log('Joining room:', roomId); // Debug log
            
            // Store room selection
            localStorage.setItem('selectedRoom', roomId);
            
            // Get Telegram user ID
            const userId = tg.initDataUnsafe?.user?.id || 'test_user';
            
            // IMPORTANT: Pass both room and user parameters with encodeURIComponent
            window.location.href = `/bingo_game.html?room=${encodeURIComponent(roomId)}&user=${encodeURIComponent(userId)}`;
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const leaderboard = await response.json();
                
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                
                leaderboard.forEach((entry, index) => {
                    const item = document.createElement('div');
                    item.className = 'leaderboard-item';
                    item.innerHTML = `
                        <span class="rank-${index + 1}">#${index + 1} ${entry.username}</span>
                        <span>${entry.winnings} Birr (${entry.wins} wins)</span>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                console.error('Error loading leaderboard:', error);
            }
        }

        // Load data
        loadRooms();
        loadLeaderboard();
        
        // Refresh every 5 seconds
        setInterval(loadRooms, 5000);
    </script>
</body>
</html>
